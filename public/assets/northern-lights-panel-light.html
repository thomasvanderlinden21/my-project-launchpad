<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Lights Panel - Light Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 40px;
        }

        .panel {
            position: relative;
            width: 400px;
            height: 600px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .panel::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            padding: 3px;
            background: linear-gradient(
                180deg,
                rgba(64, 224, 208, 0.8),
                rgba(0, 255, 157, 0.8)
            );
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            box-shadow:
                inset 0 0 30px rgba(64, 224, 208, 0.6),
                inset 0 0 60px rgba(0, 255, 157, 0.4),
                0 0 30px rgba(64, 224, 208, 0.5),
                0 0 60px rgba(0, 255, 157, 0.3);
            filter: blur(1px);
        }

        .panel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 45px;
            background: linear-gradient(
                to bottom,
                rgba(30, 255, 120, 0.5) 0%,
                rgba(50, 230, 140, 0.35) 20%,
                rgba(60, 240, 150, 0.2) 50%,
                transparent 100%
            );
            pointer-events: none;
            border-radius: 12px 12px 0 0;
        }

        .panel-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            background: #ffffff;
        }

        .panel-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 45px;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(64, 224, 208, 0.45) 0%,
                rgba(80, 240, 220, 0.3) 20%,
                rgba(90, 250, 230, 0.15) 50%,
                transparent 100%
            );
            pointer-events: none;
            z-index: 1;
        }

        .panel-content::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 45px;
            height: 100%;
            background: linear-gradient(
                to left,
                rgba(0, 255, 157, 0.5) 0%,
                rgba(40, 200, 140, 0.35) 20%,
                rgba(60, 220, 160, 0.2) 50%,
                transparent 100%
            );
            pointer-events: none;
            z-index: 1;
        }

        .glow-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45px;
            pointer-events: none;
            background: linear-gradient(
                to top,
                rgba(100, 240, 220, 0.45) 0%,
                rgba(120, 255, 230, 0.3) 20%,
                rgba(130, 255, 240, 0.18) 50%,
                transparent 100%
            );
        }
    </style>
</head>
<body>
    <div class="panel">
        <div class="panel-content">
        </div>
        <div class="glow-bottom"></div>
    </div>
</body>
</html>
